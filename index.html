<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MUSHK DARBAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0d;
      --surface: #0f1114;
      --muted: #9aa0a6;
      --gold1: #d4af37;
      --gold2: #ffcc66;
      --accent: linear-gradient(90deg, var(--gold1), var(--gold2));
      --glass: rgba(255, 255, 255, 0.03);
      --card-radius: 16px;
      --shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
      --glass-strong: rgba(255, 255, 255, 0.04);
      --maxw: 1200px;
      --gap: 20px;
      --ff-heading: 'Playfair Display', serif;
      --ff-ui: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      --orange: #ff9800;
      --green: #4CAF50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-size: 16px; }
    body {
      position: relative; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: url('bg.png') no-repeat center center/cover; filter: grayscale(100%);
      opacity: 0.5; z-index: -1;
    }
    body {
      background: radial-gradient(1200px 600px at 10% 10%, rgba(212, 175, 55, 0.06), transparent 6%),
                  radial-gradient(1000px 500px at 95% 90%, rgba(255, 204, 102, 0.04), transparent 8%), var(--bg);
      color: #e8e6e3; font-family: var(--ff-ui); -webkit-font-smoothing: antialiased;
      padding: 16px; display: flex; justify-content: center; line-height: 1.5;
    }
    .container { width: 100%; max-width: var(--maxw); display: flex; flex-direction: column; gap: var(--gap); }
    .cafe-header { text-align: center; margin-bottom: 30px; padding: 20px 0; }
    .cafe-name {
      font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 800;
      color: var(--gold1); text-shadow: 2px 2px 0px rgba(0,0,0,0.1); line-height: 1;
      margin-bottom: 5px; position: relative; display: inline-block;
    }
    .cafe-name::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      width: 80px; height: 2px; background: var(--gold1);
    }
    .cafe-subtitle { font-size: 1.2rem; color: var(--orange); letter-spacing: 3px; text-transform: uppercase; font-weight: 700; margin-top: 10px; }
    .location-info { font-size: 1rem; margin-top: 15px; line-height: 1.6; }
    .location-text { font-weight: 700; color: #ffffff; margin-bottom: 8px; }
    .address { color: var(--green); font-weight: 700; font-size: 1.05rem; margin-bottom: 8px; }
    .mobile-numbers { color: #ffffff; font-weight: 700; font-size: 1.05rem; margin-bottom: 15px; }
    .veg-nonveg { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
    .veg, .nonveg {
      display: flex; align-items: center; gap: 8px; font-weight: 500;
      padding: 8px 16px; border-radius: 30px; transition: all 0.3s ease;
    }
    .veg { color: #2e7d32; background: rgba(46,125,50,0.1); }
    .nonveg { color: #c62828; background: rgba(198,40,40,0.1); }
    .symbol { width: 16px; height: 16px; border-radius: 50%; display: inline-block; }
    .veg .symbol { background: #4caf50; border: 2px solid #2e7d32; }
    .nonveg .symbol { background: #f44336; border: 2px solid #c62828; }
    .location-link-section {
      background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(6px); text-align: center;
    }
    .location-link-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
    .location-link-header h3 { font-family: var(--ff-heading); color: var(--gold2); font-size: 1.3rem; margin: 0; }
    .map-link {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px;
      background: linear-gradient(90deg, var(--gold1), var(--gold2)); color: #0b0b0d;
      text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 1rem; transition: all 0.3s ease;
    }
    .map-link:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212,175,55,0.3); }
    .header { display: flex; flex-direction: column; gap: 16px; margin-bottom: 10px; }
    .brand { display: flex; gap: 16px; align-items: center; }
    .search-container {
      background: var(--glass); backdrop-filter: blur(6px); padding: 12px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.03); display: flex; gap: 10px; align-items: center; width: 100%;
    }
    .search-container input { background: transparent; border: 0; outline: 0; color: inherit; font-size: 16px; width: 100%; }
    .tabs-container { position: relative; margin-bottom: 10px; }
    .tabs-scroll {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; justify-content: center;
    }
    .tab {
      padding: 10px 16px; border-radius: 999px; background: transparent;
      border: 1px solid rgba(255,255,255,0.03); font-size: 14px; color: var(--muted);
      cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.3s ease; margin: 2px;
    }
    .tab.active {
      background: linear-gradient(90deg, var(--gold1), var(--gold2)); color: #0b0b0d;
      border: none; box-shadow: 0 8px 30px rgba(212,175,55,0.12);
    }
    .tab:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .menu-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 20px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
      border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
      border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 8px 24px rgba(2,6,23,0.6);
      transition: transform 0.28s cubic-bezier(0.2,0.9,0.2,1), box-shadow 0.28s;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(2,6,23,0.7); }
    .card-header { display: flex; gap: 12px; }
    .thumb { width: 180px; height: 180px; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.03); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
    .card:hover .thumb img { transform: scale(1.06); }
    .card-info { flex: 1; }
    .dish { font-size: 16px; font-weight: 600; margin: 0 0 4px 0; font-family: var(--ff-heading); line-height: 1.3; }
    .desc { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .size-selector { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .size-btn {
      padding: 6px 12px; border-radius: 20px; background: transparent;
      border: 1px solid rgba(255,255,255,0.1); color: var(--muted); font-size: 12px;
      cursor: pointer; transition: all 0.3s ease;
    }
    .size-btn.active { background: linear-gradient(90deg, var(--gold1), var(--gold2)); border-color: transparent; color: #0b0b0d; font-weight: 600; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .price { font-weight: 700; font-size: 18px; color: var(--gold2); flex-shrink: 0; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { padding: 4px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.03); font-size: 11px; color: var(--muted); background: transparent; }
    .btn-primary {
      background: linear-gradient(90deg, var(--gold1), var(--gold2)); border: none;
      padding: 8px 16px; border-radius: 8px; color: #0b0b0d; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 15px rgba(212,175,55,0.15); font-size: 13px;
      min-width: 100px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,175,55,0.25); }
    .cart-container { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
    .cart-button {
      background: linear-gradient(90deg, var(--gold1), var(--gold2)); width: 60px; height: 60px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 30px rgba(212,175,55,0.12); cursor: pointer; position: relative; border: none;
    }
    .cart-count {
      position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white;
      width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: bold;
    }
    .cart-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11,11,13,0.95); display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; padding: 16px;
    }
    .cart-modal.open { opacity: 1; visibility: visible; }
    .cart-content {
      background: var(--surface); width: 100%; max-width: 500px; border-radius: var(--card-radius);
      padding: 20px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.03);
      max-height: 80vh; overflow-y: auto;
    }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 12px; }
    .cart-title { font-family: var(--ff-heading); font-size: 22px; margin: 0; color: var(--gold2); }
    .close-cart { background: transparent; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
    .cart-items { margin-bottom: 20px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .item-name { font-weight: 600; margin: 0 0 4px 0; font-size: 15px; }
    .item-size { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .item-price { color: var(--gold2); font-size: 14px; font-weight: 600; }
    .item-quantity { display: flex; align-items: center; gap: 10px; }
    .quantity-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.03); color: var(--muted); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .remove-item { background: transparent; border: none; color: #e74c3c; cursor: pointer; margin-left: 12px; font-size: 18px; }
    .cart-empty { text-align: center; color: var(--muted); padding: 20px 0; }
    .cart-total { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-top: 1px solid rgba(255,255,255,0.03); font-weight: 600; font-size: 18px; }
    .total-amount { color: var(--gold2); }
    .cart-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .btn-add-another { background: linear-gradient(90deg, rgba(212,175,55,0.1), rgba(255,204,102,0.1)); border: 1px solid rgba(212,175,55,0.3); padding: 12px 14px; border-radius: 12px; color: var(--gold2); cursor: pointer; font-weight: 600; }
    .btn-whatsapp { background: #25D366; border: none; padding: 14px 18px; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; }
    .btn-clear { background: transparent; border: 1px solid rgba(255,255,255,0.04); padding: 12px 14px; border-radius: 12px; color: var(--muted); cursor: pointer; }
    .delivery-options { margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.015); border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); }
    .options-title { font-family: var(--ff-heading); font-size: 18px; margin-bottom: 15px; color: var(--gold2); }
    .delivery-option-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
    .option-btn { flex: 1; padding: 12px; border-radius: 8px; background: transparent; border: 2px solid rgba(255,255,255,0.08); color: var(--muted); font-weight: 600; cursor: pointer; }
    .option-btn.active { background: linear-gradient(90deg, rgba(212,175,55,0.1), rgba(255,204,102,0.1)); border-color: var(--gold1); color: var(--gold2); }
    .delivery-form { display: none; }
    .delivery-form.active { display: block; }
    .form-group { margin-bottom: 15px; }
    .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--muted); font-size: 14px; }
    .form-input { width: 100%; padding: 12px 16px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: white; font-size: 16px; }
    .customer-details-summary { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.03); display: none; }
    .customer-details-summary.active { display: block; }
    .gold-line { height: 3px; border-radius: 999px; background: linear-gradient(90deg, var(--gold1), var(--gold2)); box-shadow: 0 8px 30px rgba(212,175,55,0.08); margin: 8px 0 16px 0; }
    @media (min-width: 768px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .cart-actions { flex-direction: row; }
    }
    @media (min-width: 1024px) {
      .menu-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

</div>
<div class="cart-container">

    <div class="cart-items" id="cartItems"><div class="cart-empty" id="cartEmpty">Your cart is empty</div></div>

    <div class="cart-actions">

      <button class="btn-clear" id="clearCart">Clear Cart</button>
      <button class="btn-whatsapp" id="whatsappOrder">Order via WhatsApp</button>
    </div>
  </div>
</div>

      {"id": 85, "cat": "Mandi Special", "name": "Chicken AlfaHam Mandi", "price": "860/-", "desc": "Arabian rice with Al-Faham grilled chicken. | Single: 280/-, Half: 460/-, Full: 660/-, Family: 860/-", "tags": ["Non-Veg", "Mandi"], "img": "img/chicken_alfaham_mandi.jpg", "sizes": [{"name": "Single", "price": 280}, {"name": "Half", "price": 460}, {"name": "Full", "price": 660}, {"name": "Family", "price": 860}]},
      {"id": 86, "cat": "Mandi Special", "name": "Mutton Raan Mandi", "price": "Rs. 1499", "desc": "Whole roasted mutton leg with Arabian rice.", "tags": ["Non-Veg", "Mandi"], "img": "img/mutton_raan_mandi.jpg"},
      {"id": 87, "cat": "Mandi Special", "name": "Mutton Fried Mandi", "price": "1150/-", "desc": "Arabian rice with fried mutton pieces. | Single: 330/-, Half: 600/-, Full: 850/-, Family: 1150/-", "tags": ["Non-Veg", "Mandi"], "img": "img/mutton_fried_mandi.jpg", "sizes": [{"name": "Single", "price": 330}, {"name": "Half", "price": 600}, {"name": "Full", "price": 850}, {"name": "Family", "price": 1150}]},
      {"id": 88, "cat": "Mandi Special", "name": "Mutton Juicy Mandi", "price": "1170/-", "desc": "Arabian rice with moist mutton. | Single: 350/-, Half: 630/-, Full: 870/-, Family: 1170/-", "tags": ["Non-Veg", "Mandi"], "img": "img/mutton_juicy_mandi.jpg", "sizes": [{"name": "Single", "price": 350}, {"name": "Half", "price": 630}, {"name": "Full", "price": 870}, {"name": "Family", "price": 1170}]}
    ];

    let cart = [];
    let deliveryType = 'restaurant';
    const selectedSizes = {};

    // FIXED: Helper to extract numeric price from price string (e.g., "Rs. 50", "350/-", "Rs. 1499")
    function getPriceValue(item) {
      if (item.sizes && item.sizes.length > 0) {
        const current = selectedSizes[item.id] || item.sizes[0];
        return current.price;
      }
      const priceStr = item.price || '';
      // Remove "Rs." prefix and any non-digit characters except numbers
      const cleaned = priceStr.replace(/Rs\.\s*/i, '').replace(/[^\d]/g, '');
      const num = parseInt(cleaned, 10);
      return isNaN(num) ? 0 : num;
    }

    function selectSize(itemId, sizeName, price) {
      selectedSizes[itemId] = { name: sizeName, price: price };
      document.querySelectorAll(`.size-btn[data-item-id="${itemId}"]`).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.size === sizeName);
      });
      const priceEl = document.getElementById(`price-${itemId}`);
      if (priceEl) priceEl.textContent = `₹${price}`;
    }

    function addToCart(item, button) {
      if (item.sizes && item.sizes.length > 0) {
        const selected = selectedSizes[item.id];
        if (!selected) { alert('Please select a size first!'); return; }
        const existing = cart.findIndex(c => c.id === item.id && c.size === selected.name);
        if (existing !== -1) cart[existing].quantity += 1;
        else cart.push({ id: item.id, name: item.name, size: selected.name, price: selected.price, quantity: 1 });
      } else {
        const priceVal = getPriceValue(item);
        const existing = cart.findIndex(c => c.id === item.id && !c.size);
        if (existing !== -1) cart[existing].quantity += 1;
        else cart.push({ id: item.id, name: item.name, price: priceVal, quantity: 1 });
      }
      updateCart();
      if (button) {
        const originalText = button.innerHTML;
        button.classList.add('adding'); button.innerHTML = 'Adding...';
        setTimeout(() => {
          button.classList.remove('adding'); button.classList.add('added'); button.innerHTML = '✓ Added';
          setTimeout(() => { button.classList.remove('added'); button.innerHTML = originalText; }, 1000);
        }, 500);
      }
    }

    function removeFromCart(index) { cart.splice(index, 1); updateCart(); }
    function updateQuantity(index, change) {
      if (cart[index]) {
        cart[index].quantity += change;
        if (cart[index].quantity <= 0) removeFromCart(index);
        else updateCart();
      }
    }

    function updateCart() {
      const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
      document.getElementById('cartCount').textContent = totalItems;
      const cartItemsDiv = document.getElementById('cartItems');
      const cartEmptyDiv = document.getElementById('cartEmpty');
      if (cart.length === 0) {
        cartEmptyDiv.style.display = 'block';
        cartItemsDiv.innerHTML = '';
      } else {
        cartEmptyDiv.style.display = 'none';
        let html = ''; let total = 0;
        cart.forEach((item, idx) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          html += `<div class="cart-item">
            <div class="item-info"><div class="item-name">${item.name}</div>${item.size ? `<div class="item-size">Size: ${item.size}</div>` : ''}<div class="item-price">₹${item.price}</div></div>
            <div class="item-quantity">
              <button class="quantity-btn" onclick="updateQuantity(${idx}, -1)">-</button>
              <span class="quantity">${item.quantity}</span>
              <button class="quantity-btn" onclick="updateQuantity(${idx}, 1)">+</button>
              <button class="remove-item" onclick="removeFromCart(${idx})">×</button>
            </div>
          </div>`;
        });
        cartItemsDiv.innerHTML = html;
        document.getElementById('cartTotal').textContent = `₹${total}`;
      }
    }

    function selectDeliveryOption(type) {
      deliveryType = type;
      document.getElementById('restaurantOption').classList.toggle('active', type === 'restaurant');
      document.getElementById('homeDeliveryOption').classList.toggle('active', type === 'home');
      document.getElementById('restaurantForm').classList.toggle('active', type === 'restaurant');
      document.getElementById('homeDeliveryForm').classList.toggle('active', type === 'home');
      updateCustomerDetailsSummary();
    }

    function updateCustomerDetailsSummary() {
      const summary = document.getElementById('customerDetailsSummary');
      let html = ''; let show = false;
      if (deliveryType === 'restaurant') {
        const table = document.getElementById('tableNumber').value.trim();
        if (table) { show = true; html = `<div><strong>Table:</strong> ${table}</div>`; }
      } else {
        const name = document.getElementById('customerName').value.trim();
        const mobile = document.getElementById('customerMobile').value.trim();
        const address = document.getElementById('customerAddress').value.trim();
        if (name || mobile || address) {
          show = true;
          html = `${name ? `<div><strong>Name:</strong> ${name}</div>` : ''}${mobile ? `<div><strong>Mobile:</strong> ${mobile}</div>` : ''}${address ? `<div><strong>Address:</strong> ${address}</div>` : ''}`;
        }
      }
      summary.innerHTML = show ? `<div class="summary-title">Order Details</div><div class="summary-details">${html}</div>` : '';
      summary.classList.toggle('active', show);
    }

    function renderMenuItems(items) {
      const grid = document.getElementById('menuGrid');
      if (!items.length) {
        grid.innerHTML = '<p style="text-align:center;color:var(--muted);grid-column:1/-1;padding:40px">No items found</p>';
        return;
      }
      grid.innerHTML = items.map(item => {
        const hasSizes = item.sizes && item.sizes.length > 0;
        if (hasSizes && !selectedSizes[item.id]) selectedSizes[item.id] = item.sizes[0];
        const currentPrice = getPriceValue(item);
        const sizeBtns = hasSizes ? item.sizes.map(s => `<button class="size-btn ${selectedSizes[item.id].name === s.name ? 'active' : ''}" data-item-id="${item.id}" data-size="${s.name}" onclick="selectSize(${item.id}, '${s.name}', ${s.price})">${s.name}</button>`).join('') : '';
        // Store original button text for reset
        const itemJson = JSON.stringify(item).replace(/'/g, "\\'");
        return `<div class="card" data-cat="${item.cat}">
          <div class="card-header"><div class="thumb"><img src="${item.img}" alt="${item.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjAzKSIvPjwvc3ZnPg=='"></div>
            <div class="card-info"><h3 class="dish">${item.name}</h3><p class="desc">${item.desc}</p><div class="tags">${item.tags.map(t => `<span class="pill">${t}</span>`).join('')}</div>${hasSizes ? `<div class="size-selector">${sizeBtns}</div>` : ''}</div>
          </div>
          <div class="card-footer"><div class="price" id="price-${item.id}">₹${currentPrice}</div><button class="btn-primary" data-item='${itemJson}' onclick="addToCart(JSON.parse(this.dataset.item), this)">Add to Cart</button></div>
        </div>`;
      }).join('');
    }

    function filterByCategory(cat) {
      renderMenuItems(cat === 'all' ? data : data.filter(i => i.cat === cat));
    }

    function searchItems(q) {
      const filtered = data.filter(i => i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q) || (i.tags && i.tags.some(t => t.toLowerCase().includes(q))));
      renderMenuItems(filtered);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      selectDeliveryOption('restaurant');
      renderMenuItems(data);
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          filterByCategory(tab.dataset.cat);
        });
      });
      document.getElementById('search').addEventListener('input', e => searchItems(e.target.value));
      document.getElementById('tableNumber').addEventListener('input', updateCustomerDetailsSummary);
      document.getElementById('customerName').addEventListener('input', updateCustomerDetailsSummary);
      document.getElementById('customerMobile').addEventListener('input', updateCustomerDetailsSummary);
      document.getElementById('customerAddress').addEventListener('input', updateCustomerDetailsSummary);
      
      document.getElementById('cartButton').addEventListener('click', () => document.getElementById('cartModal').classList.add('open'));
      document.getElementById('closeCart').addEventListener('click', () => document.getElementById('cartModal').classList.remove('open'));
      document.getElementById('clearCart').addEventListener('click', () => { cart = []; updateCart(); });
      document.getElementById('addAnotherItem').addEventListener('click', () => {
        document.getElementById('cartModal').classList.remove('open');
        window.scrollTo({ top: document.querySelector('.menu-head').offsetTop - 20, behavior: 'smooth' });
        setTimeout(() => document.getElementById('search').focus(), 500);
      });
      document.getElementById('whatsappOrder').addEventListener('click', () => {
        if (!cart.length) { alert('Cart empty!'); return; }
        let msg = `Hello! I would like to place an order:\n\n`;
        if (deliveryType === 'restaurant') {
          const t = document.getElementById('tableNumber').value.trim();
          if (!t) { alert('Enter table number'); return; }
          msg += `*Dine-in | Table:* ${t}\n\n`;
        } else {
          const n = document.getElementById('customerName').value.trim();
          const m = document.getElementById('customerMobile').value.trim();
          const a = document.getElementById('customerAddress').value.trim();
          if (!n || !m || !a) { alert('Fill all delivery details'); return; }
          msg += `*Delivery*\nName: ${n}\nMobile: ${m}\nAddress: ${a}\n\n`;
        }
        msg += `*Order:*\n`;
        let total = 0;
        cart.forEach(i => { msg += `• ${i.name}${i.size ? ' ('+i.size+')' : ''} - ${i.quantity} x ₹${i.price}\n`; total += i.price * i.quantity; });
        msg += `\n*Total: ₹${total}*`;
        window.open(`https://wa.me/918971040431?text=${encodeURIComponent(msg)}`, '_blank');
        setTimeout(() => document.getElementById('cartModal').classList.remove('open'), 1000);
      });
    });

    window.selectSize = selectSize;
    window.addToCart = addToCart;
    window.removeFromCart = removeFromCart;
    window.updateQuantity = updateQuantity;
    window.selectDeliveryOption = selectDeliveryOption;
  })();
</script>
</body>
</html>
